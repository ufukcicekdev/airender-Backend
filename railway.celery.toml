# Railway — Celery worker (separate service, same repo)
# Dashboard: Root Directory = backend, Config file = railway.celery.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "celery -A config worker -l info -Q default,rendering --concurrency=2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
